# E2C Evaluation Configuration
# Configuration for model evaluation on benchmarks

eval:
  # Dataset configuration
  dataset: ['gsm8k']  # Options: gsm8k, math, aime24, aime25, amc23, math500, minerva, olympiad_bench, all, med, medqa, medmcqa, etc.
  sample_num: 1  # Number of samples per question
  batch_size: -1  # -1 for auto, or specify batch size
  max_new_tokens: -1  # -1 for auto, or specify max tokens
  temperature: 1.0  # Sampling temperature
  top_p: 1.0  # Top-p sampling
  seed: 0  # Random seed
  save_path: "./evaluation"  # Output directory for evaluation results
  
  # Evaluation settings
  backend: "hf"  # Backend type: hf or vllm
  need_static: true  # Generate static results
  resume: false  # Resume from checkpoint
  
  # System prompt and formatting
  system_prompt: null  # System prompt (null for default, or specify custom prompt)
  question_prefix: ""  # Question prefix
  question_suffix: "Provide the final answer in the boxed{}. Please reasoning step-by-step."  # Question suffix
  use_default: false  # Use default prompts for medical datasets
  
  # Special tokens
  head: ["begin"]  # Special tokens marking start
  tail: ["end"]  # Special tokens marking end
  separator: "<EXECUTION>"  # Separator token
  
  # Evaluation settings
  answer_seg: "boxed"  # Answer format
  stop_token: null  # Stop token
  checklist: []  # Format check list (empty for default)
  
  # Advanced settings
  combine_num: 0  # Number of explorations to combine (0 = disabled)
  save_head: false  # Save head information

model:
  # Model configuration
  type: "hf"  # Model type: hf or vllm
  model_path: "TingheOliver/Explore-Execute-Chain-Qwen"  # Model path (HuggingFace ID or local path)
  checkpoint_path: null  # Optional: local checkpoint path
  subfolder: "Qwen3-8B-E2C-SFT-RL"  # Subfolder for HuggingFace models (null or "" for local paths)
  trust_remote_code: true  # Trust remote code for custom models
  
  # Model settings
  torch_dtype: "bfloat16"  # Data type
  device_map: "auto"  # Device mapping
  use_cache: true  # Use KV cache
  
  # VLLM specific settings
  vllm:
    tensor_parallel_size: -1  # -1 for auto-detect all GPUs, or specify number
    gpu_memory_utilization: 0.85  # GPU memory utilization
    max_model_len: 8192  # Maximum sequence length
    dtype: "bfloat16"  # Model dtype
    trust_remote_code: true  # Trust remote code

