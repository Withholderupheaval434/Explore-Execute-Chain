trainer:
  nnodes: 1
  n_gpus_per_node: 8
  device: cuda

data:
  path: ~/Kaisen.Yang/CoT Decomposition/dataset/qwen6/openr1.parquet
  prompt_key: question
  n_samples: 1
  output_path: ~/Kaisen.Yang/CoT Decomposition/dataset/qwen6/openr1_processed.parquet
  batch_size: 30

model:
  path: Qwen/Qwen3-4B
  external_lib: null
rollout:
  _target_: verl.workers.config.RolloutConfig
  name: vllm
  mode: sync # sync: LLM, async: AsyncLLM
  temperature: 1.0
  top_k: -1 # 0 for hf rollout, -1 for vllm rollout
  top_p: 0.7
  prompt_length: 1000
  response_length: 20000
  # for vllm rollout
  dtype: bfloat16 # should align with FSDP
  gpu_memory_utilization: 0.9
  ignore_eos: False
  enforce_eager: True
  free_cache_engine: True
  load_format: dummy_dtensor
  tensor_model_parallel_size: 1
  max_num_batched_tokens: 200000
  max_model_len: null
  max_num_seqs: 256
  log_prob_micro_batch_size: null # will be deprecated, use log_prob_micro_batch_size_per_gpu
  log_prob_micro_batch_size_per_gpu: 16
  # for hf rollout
  do_sample: True
  disable_log_stats: True
  enable_chunked_prefill: False
  n: 1
  # support logging rollout prob for debugging purpose
  calculate_log_probs: False
actor:
  strategy: fsdp  # This is for backward-compatibility
  ulysses_sequence_parallel_size: 1 # sp size
  entropy_from_logits_with_chunking: False  # calculate entropy with chunking to reduce memory peak
  entropy_checkpointing: False  # recompute entropy
  fsdp_config:
    fsdp_size: -1
    forward_prefetch: False  # FSDP1 forward_prefetch configuration

ray_init:
  num_cpus: null # `None` means using all CPUs, which might cause hang if limited in systems like SLURM. Please set to a number allowed then.
  timeline_json_file: null
